<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial;
    overflow:hidden;
    color:white;
}


.navbar{
    position:sticky;
    top:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:rgba(0,0,0,0.75);

    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    z-index:1000;
}

.navbar a{
    color:white;
    text-decoration:none;

    margin:0 25px;

    font-weight:bold;

    letter-spacing:1px;

    transition:0.3s;
}

.navbar a:hover{
    color:#ff66c4;
    text-shadow:0 0 12px #ff66c4;
}

/* GAME CONTAINER */
#gameContainer{
    position:relative;
    width:900px;
    height:600px;
    margin:40px auto;

    background:black;

    border:2px solid white;

    overflow:hidden;
}

/* STAR BACKGROUND */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:0.2;
    }
    to{
        opacity:1;
    }
}

canvas{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
}

/* HUD */
.hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:2;
}

.lives{
    position:absolute;
    top:10px;
    right:10px;
    color:#ff4d4d;
    z-index:2;
}

/* GAME OVER */
#gameOverScreen{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
    color:white;
    z-index:10;
}

button{
    padding:10px 18px;
    background:white;
    color:black;
    border:none;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

button:hover{
    opacity:0.8;
}

</style>
</head>

<body>

<nav class="navbar">
<a href="INDEX.html">Home</a>
<a href="Planets.html">Planets</a>
<a href="Contact.html">Contact</a>
<a href="Questions.html">FAQ</a>
<a href="game.html">Play Game</a>
</nav>

<div id="gameContainer">

<div class="stars" id="stars"></div>

<div class="hud">
    <div id="score">Score: 0</div>
</div>

<div class="lives" id="lives">❤️❤️❤️</div>

<div id="gameOverScreen">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">Try Again</button>
</div>

<canvas id="game"></canvas>

</div>

<script>

/* STAR GENERATOR */
const starsContainer = document.getElementById("stars");

for(let i=0;i<150;i++){

    let star = document.createElement("div");

    star.classList.add("star");

    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";

    star.style.width = Math.random()*3 + "px";
    star.style.height = star.style.width;

    star.style.animationDuration =
        (Math.random()*3+1) + "s";

    starsContainer.appendChild(star);
}

/* CANVAS */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

/* IMAGES */
const rocket1 = new Image();
rocket1.src = "Images/rocketfr1.png";

const rocket2 = new Image();
rocket2.src = "Images/rocketfr2.png";

const astrImg = new Image();
astrImg.src = "Images/astr.png";

const healImg = new Image();
healImg.src = "Images/heal.png";

/* PLAYER */
let player = {
    x:450,
    y:520,
    width:60,
    height:60,
    speed:6
};

/* OBJECTS */
let bullets = [];
let enemies = [];
let powerups = [];

let score = 0;
let lives = 3;

let keys = {};

/* INPUT */
document.addEventListener("keydown", e=>{

    keys[e.key] = true;

    if(e.key === " "){
        bullets.push({
            x:player.x + 28,
            y:player.y
        });
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

/* SPAWN ENEMIES */
setInterval(()=>{

    enemies.push({
        x:Math.random()*840,
        y:-40,
        size:40,
        speed:2.5
    });

},700);

/* SPAWN HEALS */
setInterval(()=>{

    powerups.push({
        x:Math.random()*840,
        y:-40,
        size:35,
        speed:2
    });

},5000);

/* UPDATE */
function update(){

    if(keys["ArrowLeft"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"]){
        player.x += player.speed;
    }

    player.x = Math.max(
        0,
        Math.min(840,player.x)
    );

    /* BULLETS */
    bullets.forEach((b,i)=>{

        b.y -= 8;

        if(b.y < 0){
            bullets.splice(i,1);
        }
    });

    /* ENEMIES */
    enemies.forEach((e,ei)=>{

        e.y += e.speed;

        if(
            Math.abs(e.x-player.x)<30 &&
            Math.abs(e.y-player.y)<30
        ){
            enemies.splice(ei,1);
            lives--;
            updateLives();
        }

        bullets.forEach((b,bi)=>{

            if(
                Math.abs(e.x-b.x)<25 &&
                Math.abs(e.y-b.y)<25
            ){

                enemies.splice(ei,1);
                bullets.splice(bi,1);

                score += 10;

                updateScore();
            }
        });
    });

    /* HEAL */
    powerups.forEach((p,pi)=>{

        p.y += p.speed;

        if(
            Math.abs(p.x-player.x)<30 &&
            Math.abs(p.y-player.y)<30
        ){

            powerups.splice(pi,1);

            score += 50;

            lives = Math.min(3,lives+1);

            updateScore();
            updateLives();
        }
    });

    if(lives <= 0){
        gameOver();
    }
}

/* DRAW */
function draw(){

    ctx.clearRect(0,0,900,600);

    /* ROCKET ANIMATION */
    let rocket =
        Math.floor(Date.now()/200)%2===0
        ? rocket1
        : rocket2;

    ctx.drawImage(
        rocket,
        player.x,
        player.y,
        player.width,
        player.height
    );

    /* BULLETS */
    ctx.fillStyle="white";

    bullets.forEach(b=>{

        ctx.fillRect(
            b.x,
            b.y,
            4,
            12
        );
    });

    /* ASTR ENEMIES */
    enemies.forEach(e=>{

        ctx.drawImage(
            astrImg,
            e.x,
            e.y,
            e.size,
            e.size
        );
    });

    /* HEALS */
    powerups.forEach(p=>{

        ctx.drawImage(
            healImg,
            p.x,
            p.y,
            p.size,
            p.size
        );
    });
}

/* HUD */
function updateScore(){
    document.getElementById("score")
    .innerText = "Score: " + score;
}

function updateLives(){
    document.getElementById("lives")
    .innerText = "❤️".repeat(lives);
}

/* GAME OVER */
function gameOver(){

    document.getElementById(
        "gameOverScreen"
    ).style.display = "flex";
}

/* RESTART */
function restartGame(){

    score = 0;
    lives = 3;

    bullets = [];
    enemies = [];
    powerups = [];

    player.x = 450;

    updateScore();
    updateLives();

    document.getElementById(
        "gameOverScreen"
    ).style.display = "none";
}

/* LOOP */
function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
