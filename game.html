<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>

<style>

.navbar{
    position:sticky;
    top:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    background:rgba(0,0,0,0.75);

    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    z-index:1000;
}

.navbar a{
    color:white;
    text-decoration:none;

    margin:0 25px;

    font-weight:bold;

    letter-spacing:1px;

    transition:0.3s;
}

.navbar a:hover{
    color:#ff66c4;
    text-shadow:0 0 12px #ff66c4;
}

/* BACKGROUND */
body{
    margin:0;
    background: radial-gradient(circle at center,#0b0f1a 0%,#000 100%);
    font-family:Arial;
    overflow:hidden;
}

/* GAME CONTAINER */
#gameContainer{
    position:relative;
    width:900px;
    height:600px;
    margin:40px auto;

    background: radial-gradient(circle at center,#0a1020,#000);

    border:1px solid rgba(255,79,160,0.25);
    box-shadow:0 0 60px rgba(255,79,160,0.15);
    border-radius:12px;
}

.play-btn{
    padding:8px 14px;

    border:1px solid rgba(255,79,160,0.5);
    border-radius:8px;

    background:rgba(0,0,0,0.4);
    color:#ff4fa0;

    text-decoration:none;
    font-weight:bold;

    transition:0.3s;
}

.play-btn:hover{
    background:#ff4fa0;
    color:black;
    box-shadow:0 0 15px rgba(255,79,160,0.5);
}

/* CANVAS */
canvas{
    width:100%;
    height:100%;
}

/* HUD */
.hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:14px;
}

.lives{
    position:absolute;
    top:10px;
    right:10px;
    color:#ff4d4d;
}

/* GAME OVER SCREEN */
#gameOverScreen{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.85);
    color:white;
    text-align:center;
    border-radius:12px;
}

#gameOverScreen h1{
    color:#ff4d4d;
    letter-spacing:4px;
}

button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    background:#ff4fa0;
    color:black;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
}

button:hover{
    opacity:0.8;
}

</style>
</head>

<nav class="navbar">

<a href="INDEX.html">Home</a>
<a href="Planets.html">Planets</a>
<a href="Contact.html">Contact</a>
<a href="Questions.html">FAQ</a>
<a href="game.html" class="play-btn">Play Game</a>

</nav>

<body>

<div id="gameContainer">

    <div class="hud">
        <div id="score">Score: 0</div>
        <div id="speed">Speed: 1</div>
    </div>

    <div class="lives" id="lives">❤️❤️❤️</div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="finalScore"></p>
        <button onclick="restartGame()">Try Again</button>
    </div>

    <canvas id="game"></canvas>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

/* PLAYER */
let player = {
    x:450,
    y:520,
    size:18,
    speed:6
};

/* GAME STATE */
let bullets = [];
let enemies = [];
let powerups = [];

let score = 0;
let lives = 3;
let gameSpeed = 1;

let keys = {};

/* INPUT */
document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(e.key === " "){
        bullets.push({x:player.x,y:player.y});
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

/* SPAWN ENEMIES */
setInterval(()=>{
    enemies.push({
        x:Math.random()*880,
        y:-20,
        size:18,
        speed:2 + gameSpeed
    });
},700);

/* POWERUPS */
setInterval(()=>{
    powerups.push({
        x:Math.random()*880,
        y:-20,
        size:14,
        speed:2
    });
},5000);

/* UPDATE */
function update(){

    gameSpeed += 0.002;

    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(0,Math.min(880,player.x));

    bullets.forEach((b,i)=>{
        b.y -= 8;
        if(b.y < 0) bullets.splice(i,1);
    });

    enemies.forEach((e,ei)=>{
        e.y += e.speed;

        if(Math.abs(e.x-player.x)<20 && Math.abs(e.y-player.y)<20){
            enemies.splice(ei,1);
            lives--;
            updateLives();
        }

        bullets.forEach((b,bi)=>{
            if(Math.abs(e.x-b.x)<20 && Math.abs(e.y-b.y)<20){
                enemies.splice(ei,1);
                bullets.splice(bi,1);
                score += 10;
                updateScore();
            }
        });
    });

    powerups.forEach((p,pi)=>{
        p.y += p.speed;

        if(Math.abs(p.x-player.x)<20 && Math.abs(p.y-player.y)<20){
            powerups.splice(pi,1);
            score += 50;
            lives = Math.min(3,lives+1);
            updateScore();
            updateLives();
        }
    });

    if(lives <= 0){
        gameOver();
    }

}

/* DRAW */
function draw(){

    ctx.clearRect(0,0,900,600);

    ctx.fillStyle="#ff4fa0";
    ctx.fillRect(player.x,player.y,player.size,player.size);

    ctx.fillStyle="white";
    bullets.forEach(b=>{
        ctx.fillRect(b.x,b.y,3,10);
    });

    ctx.fillStyle="#00d4ff";
    enemies.forEach(e=>{
        ctx.fillRect(e.x,e.y,e.size,e.size);
    });

    ctx.fillStyle="#00ff88";
    powerups.forEach(p=>{
        ctx.fillRect(p.x,p.y,p.size,p.size);
    });

}

/* HUD */
function updateScore(){
    document.getElementById("score").innerText="Score: "+score;
}

function updateLives(){
    document.getElementById("lives").innerText="❤️".repeat(lives);
}

/* GAME OVER */
function gameOver(){
    document.getElementById("gameOverScreen").style.display="flex";
    document.getElementById("finalScore").innerText="Score: "+score;
}

/* RESTART */
function restartGame(){

    score=0;
    lives=3;
    gameSpeed=1;

    bullets=[];
    enemies=[];
    powerups=[];

    player.x=450;

    updateScore();
    updateLives();

    document.getElementById("gameOverScreen").style.display="none";
}

/* LOOP */
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
