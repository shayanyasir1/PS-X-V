<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    color:white;

    background:
    radial-gradient(circle at top,#2a1020,#000);

    min-height:100vh;
}

.navbar{
    position:sticky;
    top:0;

    display:flex;
    justify-content:center;

    padding:20px;

    background:rgba(0,0,0,0.75);

    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    z-index:1000;
}

.navbar a{
    color:white;
    text-decoration:none;

    margin:0 25px;

    font-weight:bold;

    letter-spacing:1px;

    transition:0.3s;
}

.navbar a:hover{
    color:#ff66c4;
    text-shadow:0 0 10px #ff66c4;
}

.play-btn{
    margin-left:auto;

    padding:10px 16px;

    border:1px solid #ff4fa0;

    border-radius:10px;

    color:#ff4fa0;

    text-decoration:none;

    font-weight:bold;

    transition:0.3s;
}

.play-btn:hover{
    background:#ff4fa0;
    color:black;
    box-shadow:0 0 20px rgba(255,79,160,0.5);
}

.container{
    max-width:700px;
    margin:60px auto;
    padding:20px;
}

.contact-card{
    background:rgba(255,255,255,0.05);

    padding:40px;

    border-radius:20px;

    border:1px solid rgba(255,255,255,0.08);
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
}

input,
textarea{
    width:100%;
    padding:14px;

    border:none;

    border-radius:10px;

    background:rgba(0,0,0,0.5);

    color:white;
}

button{
    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#ff4da6;

    color:white;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

</style>

</head>

<body>

<nav class="navbar">
<a href="index.html">Home</a>
    <a href="Planets.html">Planets</a>
    <a href="Contact.html">Contact</a>
    <a href="Questions.html">FAQ</a>
    <a href="game.html" class="play-btn">Play Game</a>
</nav>

<div class="container">

<div class="contact-card">

<h1>Broadcast Message</h1>

<br>

<form action="https://formsubmit.co/shayan.yasir@education.nsw.gov.au" method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_subject" value="PlanetScope Transmission">

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Message</label>
<textarea name="message" rows="5" required></textarea>
</div>

<button type="submit">
Broadcast Transmission
</button>

</form>

</div>

</div>

</body>
</html>
